<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Energy Tracker">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Battery, Clock, TrendingUp, Calendar, Plus, BarChart3, Moon, Coffee, Utensils, Dumbbell, Users, Bell } = lucide;

        const EnergyTrackerApp = () => {
          const [currentView, setCurrentView] = useState('home');
          const [energyEntries, setEnergyEntries] = useState([]);
          const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
          const [notificationsEnabled, setNotificationsEnabled] = useState(false);

          // PWA Installation and Notifications
          useEffect(() => {
            // Load data from localStorage
            const savedEntries = localStorage.getItem('energyEntries');
            if (savedEntries) {
              setEnergyEntries(JSON.parse(savedEntries));
            }

            // Check if app is installed as PWA
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            if (isStandalone) {
              document.title = 'Energy Tracker';
            }

            // Register service worker for PWA functionality
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/sw.js').catch(console.error);
            }
          }, []);

          // Save data to localStorage whenever entries change
          useEffect(() => {
            localStorage.setItem('energyEntries', JSON.stringify(energyEntries));
          }, [energyEntries]);

          // Notification setup
          const requestNotificationPermission = async () => {
            if ('Notification' in window) {
              const permission = await Notification.requestPermission();
              setNotificationsEnabled(permission === 'granted');
              if (permission === 'granted') {
                scheduleNotifications();
              }
            }
          };

          const scheduleNotifications = () => {
            // Clear existing notifications
            if ('serviceWorker' in navigator && 'PushManager' in window) {
              // Schedule daily reminders
              const times = [
                { time: '10:00', message: '🌅 Time for your mid-morning energy check!' },
                { time: '15:00', message: '☀️ Mid-afternoon energy check-in!' },
                { time: '18:00', message: '🌆 Evening energy level check!' }
              ];
              
              times.forEach(({time, message}) => {
                const [hours, minutes] = time.split(':');
                const now = new Date();
                const scheduledTime = new Date();
                scheduledTime.setHours(parseInt(hours), parseInt(minutes), 0, 0);
                
                if (scheduledTime <= now) {
                  scheduledTime.setDate(scheduledTime.getDate() + 1);
                }
                
                const timeUntilNotification = scheduledTime.getTime() - now.getTime();
                
                setTimeout(() => {
                  if (Notification.permission === 'granted') {
                    new Notification('Energy Tracker', {
                      body: message,
                      icon: '/icon-192.png',
                      badge: '/icon-192.png'
                    });
                  }
                }, timeUntilNotification);
              });
            }
          };

          // Check-in times
          const checkInTimes = [
            { id: 'wakeup', label: 'Upon Waking', time: 'Wake Up', icon: '🌅' },
            { id: 'midmorning', label: 'Mid-Morning', time: '10:00 AM', icon: '☀️' },
            { id: 'midafternoon', label: 'Mid-Afternoon', time: '3:00 PM', icon: '🌤️' },
            { id: 'evening', label: 'Evening', time: '6:00 PM', icon: '🌆' },
            { id: 'bedtime', label: 'Bedtime', time: 'Before Bed', icon: '🌙' }
          ];

          // Sample data for demonstration (only if no saved data)
          useEffect(() => {
            if (energyEntries.length === 0) {
              const sampleData = [
                { id: 1, date: '2025-09-25', time: 'wakeup', energy: 6, sleep: 7, notes: 'Good sleep' },
                { id: 2, date: '2025-09-25', time: 'midmorning', energy: 8, coffee: true, notes: 'Had coffee' },
                { id: 3, date: '2025-09-24', time: 'wakeup', energy: 4, sleep: 5, notes: 'Restless night' },
                { id: 4, date: '2025-09-24', time: 'midmorning', energy: 7, coffee: true, exercise: true, notes: 'Yoga session' },
                { id: 5, date: '2025-09-23', time: 'wakeup', energy: 7, sleep: 8, notes: 'Great sleep' },
              ];
              setEnergyEntries(sampleData);
            }
          }, []);

          const getEnergyColor = (level) => {
            if (level >= 9) return 'bg-green-500';
            if (level >= 7) return 'bg-lime-400';
            if (level >= 5) return 'bg-yellow-400';
            if (level >= 3) return 'bg-orange-400';
            return 'bg-red-400';
          };

          const getEnergyDescription = (level, isBedtime = false) => {
            if (isBedtime) {
              if (level >= 9) return 'Very Tired - Will pass out soon';
              if (level >= 7) return 'Tired - Bed is calling';
              if (level >= 5) return 'Tired & Wired - Dragging but restless';
              if (level >= 3) return 'Awake - Hours before sleepy';
              return 'Wide Awake - Cannot sleep now';
            }
            
            if (level >= 10) return 'Maximum Energy - Hell yes to everything!';
            if (level >= 8) return 'High Energy - Yes to fun activities';
            if (level >= 6) return 'Adequate Energy - Okay to activities';
            if (level >= 4) return 'Moderate Energy - Probably not to activities';
            if (level >= 2) return 'Low Energy - Must say no to activities';
            return 'Very Low Energy - Everything feels impossible';
          };

          const LogEntry = ({ timeSlot }) => {
            const [energy, setEnergy] = useState(5);
            const [sleep, setSleep] = useState(7);
            const [coffee, setCoffee] = useState(false);
            const [meal, setMeal] = useState(false);
            const [exercise, setExercise] = useState(false);
            const [clients, setClients] = useState(false);
            const [notes, setNotes] = useState('');

            const handleSave = () => {
              const newEntry = {
                id: Date.now(),
                date: selectedDate,
                time: timeSlot.id,
                energy,
                sleep: timeSlot.id === 'wakeup' ? sleep : null,
                coffee,
                meal,
                exercise,
                clients,
                notes
              };
              setEnergyEntries(prev => [...prev, newEntry]);
              setCurrentView('home');
            };

            return React.createElement('div', {className: "max-w-sm mx-auto bg-white min-h-screen"},
              React.createElement('div', {className: "bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4"},
                React.createElement('button', {onClick: () => setCurrentView('home'), className: "text-white mb-2"}, "← Back"),
                React.createElement('h2', {className: "text-xl font-bold"}, timeSlot.icon + " " + timeSlot.label),
                React.createElement('p', {className: "opacity-90"}, timeSlot.time)
              ),

              React.createElement('div', {className: "p-4 space-y-6"},
                React.createElement('div', null,
                  React.createElement('label', {className: "block text-sm font-semibold mb-2"}, "Energy Level: " + energy + "/10"),
                  React.createElement('div', {className: "flex items-center space-x-2 mb-2"},
                    React.createElement(Battery, {className: "w-5 h-5"}),
                    React.createElement('div', {
                      className: getEnergyColor(energy) + " h-4 rounded-full flex-1",
                      style: {width: (energy * 10) + "%"}
                    })
                  ),
                  React.createElement('input', {
                    type: "range",
                    min: "1",
                    max: "10",
                    value: energy,
                    onChange: (e) => setEnergy(parseInt(e.target.value)),
                    className: "w-full"
                  }),
                  React.createElement('p', {className: "text-xs text-gray-600 mt-1"}, getEnergyDescription(energy, timeSlot.id === 'bedtime'))
                ),

                timeSlot.id === 'wakeup' && React.createElement('div', null,
                  React.createElement('label', {className: "block text-sm font-semibold mb-2"}, "Sleep Hours: " + sleep),
                  React.createElement('input', {
                    type: "range",
                    min: "3",
                    max: "12",
                    value: sleep,
                    onChange: (e) => setSleep(parseInt(e.target.value)),
                    className: "w-full"
                  })
                ),

                React.createElement('div', null,
                  React.createElement('label', {className: "block text-sm font-semibold mb-3"}, "Contextual Factors"),
                  React.createElement('div', {className: "grid grid-cols-2 gap-3"},
                    React.createElement('button', {
                      onClick: () => setCoffee(!coffee),
                      className: "p-3 rounded-lg border flex items-center space-x-2 " + (coffee ? 'bg-amber-100 border-amber-300' : 'bg-gray-50 border-gray-200')
                    },
                      React.createElement(Coffee, {className: "w-4 h-4"}),
                      React.createElement('span', {className: "text-sm"}, "Coffee")
                    ),
                    React.createElement('button', {
                      onClick: () => setMeal(!meal),
                      className: "p-3 rounded-lg border flex items-center space-x-2 " + (meal ? 'bg-green-100 border-green-300' : 'bg-gray-50 border-gray-200')
                    },
                      React.createElement(Utensils, {className: "w-4 h-4"}),
                      React.createElement('span', {className: "text-sm"}, "Meal")
                    ),
                    React.createElement('button', {
                      onClick: () => setExercise(!exercise),
                      className: "p-3 rounded-lg border flex items-center space-x-2 " + (exercise ? 'bg-blue-100 border-blue-300' : 'bg-gray-50 border-gray-200')
                    },
                      React.createElement(Dumbbell, {className: "w-4 h-4"}),
                      React.createElement('span', {className: "text-sm"}, "Exercise")
                    ),
                    React.createElement('button', {
                      onClick: () => setClients(!clients),
                      className: "p-3 rounded-lg border flex items-center space-x-2 " + (clients ? 'bg-purple-100 border-purple-300' : 'bg-gray-50 border-gray-200')
                    },
                      React.createElement(Users, {className: "w-4 h-4"}),
                      React.createElement('span', {className: "text-sm"}, "Client Work")
                    )
                  )
                ),

                React.createElement('div', null,
                  React.createElement('label', {className: "block text-sm font-semibold mb-2"}, "Notes"),
                  React.createElement('textarea', {
                    value: notes,
                    onChange: (e) => setNotes(e.target.value),
                    placeholder: "How are you feeling? Any observations...",
                    className: "w-full p-3 border border-gray-200 rounded-lg",
                    rows: "3"
                  })
                ),

                React.createElement('button', {
                  onClick: handleSave,
                  className: "w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold"
                }, "Save Entry")
              )
            );
          };

          const Dashboard = () => {
            const todayEntries = energyEntries.filter(entry => entry.date === selectedDate);
            const weekData = energyEntries.filter(entry => {
              const entryDate = new Date(entry.date);
              const today = new Date(selectedDate);
              const weekStart = new Date(today);
              weekStart.setDate(today.getDate() - 6);
              return entryDate >= weekStart && entryDate <= today;
            });

            const peakHours = () => {
              const timeAverages = {};
              checkInTimes.forEach(time => {
                const entries = energyEntries.filter(e => e.time === time.id);
                if (entries.length > 0) {
                  const avg = entries.reduce((sum, e) => sum + e.energy, 0) / entries.length;
                  timeAverages[time.label] = avg.toFixed(1);
                }
              });
              return timeAverages;
            };

            const peaks = peakHours();

            return React.createElement('div', {className: "max-w-sm mx-auto bg-gray-50 min-h-screen"},
              React.createElement('div', {className: "bg-gradient-to-r from-green-600 to-teal-600 text-white p-4"},
                React.createElement('button', {onClick: () => setCurrentView('home'), className: "text-white mb-2"}, "← Back"),
                React.createElement('h2', {className: "text-xl font-bold flex items-center"},
                  React.createElement(BarChart3, {className: "w-6 h-6 mr-2"}),
                  "Dashboard"
                )
              ),

              React.createElement('div', {className: "p-4 space-y-4"},
                React.createElement('div', {className: "bg-white rounded-lg p-4 shadow-sm"},
                  React.createElement('h3', {className: "font-semibold text-gray-800 mb-3 flex items-center"},
                    React.createElement(TrendingUp, {className: "w-4 h-4 mr-2"}),
                    "Peak Performance Hours"
                  ),
                  React.createElement('div', {className: "space-y-2"},
                    Object.entries(peaks).map(([time, avg]) =>
                      React.createElement('div', {key: time, className: "flex justify-between items-center"},
                        React.createElement('span', {className: "text-sm text-gray-600"}, time),
                        React.createElement('div', {className: "flex items-center space-x-2"},
                          React.createElement('div', {className: "w-3 h-3 rounded-full " + getEnergyColor(parseFloat(avg))}),
                          React.createElement('span', {className: "text-sm font-medium"}, avg + "/10")
                        )
                      )
                    )
                  )
                )
              )
            );
          };

          const HomeScreen = () => {
            const todayEntries = energyEntries.filter(entry => entry.date === selectedDate);
            const completedToday = todayEntries.map(entry => entry.time);

            return React.createElement('div', {className: "max-w-sm mx-auto bg-gray-50 min-h-screen"},
              React.createElement('div', {className: "bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4"},
                React.createElement('h1', {className: "text-2xl font-bold mb-1"}, "Energy Tracker"),
                React.createElement('p', {className: "opacity-90"}, "Track your energy patterns"),
                React.createElement('div', {className: "flex items-center justify-between mt-3"},
                  React.createElement('input', {
                    type: "date",
                    value: selectedDate,
                    onChange: (e) => setSelectedDate(e.target.value),
                    className: "bg-white/20 text-white rounded px-3 py-1 text-sm"
                  }),
                  React.createElement('button', {
                    onClick: requestNotificationPermission,
                    className: "flex items-center space-x-1 px-3 py-1 rounded text-sm " + (notificationsEnabled ? 'bg-green-500/20' : 'bg-white/20')
                  },
                    React.createElement(Bell, {className: "w-4 h-4"}),
                    React.createElement('span', null, notificationsEnabled ? 'On' : 'Notifications')
                  )
                )
              ),

              React.createElement('div', {className: "p-4"},
                React.createElement('div', {className: "mb-6"},
                  React.createElement('h2', {className: "text-lg font-semibold mb-3 flex items-center"},
                    React.createElement(Clock, {className: "w-5 h-5 mr-2"}),
                    "Today's Check-ins"
                  ),
                  React.createElement('div', {className: "space-y-3"},
                    checkInTimes.map(timeSlot => {
                      const isCompleted = completedToday.includes(timeSlot.id);
                      const entry = todayEntries.find(e => e.time === timeSlot.id);
                      
                      return React.createElement('div', {
                        key: timeSlot.id,
                        onClick: () => setCurrentView(`log-${timeSlot.id}`),
                        className: "p-4 rounded-lg border cursor-pointer transition-all " + (isCompleted ? 'bg-white border-green-200 shadow-sm' : 'bg-white border-gray-200 hover:border-blue-300')
                      },
                        React.createElement('div', {className: "flex items-center justify-between"},
                          React.createElement('div', {className: "flex items-center space-x-3"},
                            React.createElement('span', {className: "text-2xl"}, timeSlot.icon),
                            React.createElement('div', null,
                              React.createElement('h3', {className: "font-medium"}, timeSlot.label),
                              React.createElement('p', {className: "text-sm text-gray-600"}, timeSlot.time)
                            )
                          ),
                          isCompleted ? 
                            React.createElement('div', {className: "flex items-center space-x-2"},
                              React.createElement('div', {
                                className: "w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold " + getEnergyColor(entry.energy)
                              }, entry.energy)
                            ) :
                            React.createElement(Plus, {className: "w-6 h-6 text-gray-400"})
                        )
                      );
                    })
                  )
                ),

                React.createElement('div', {className: "grid grid-cols-2 gap-3 mb-6"},
                  React.createElement('button', {
                    onClick: () => setCurrentView('dashboard'),
                    className: "bg-gradient-to-r from-green-500 to-teal-500 text-white p-4 rounded-lg flex items-center justify-center space-x-2"
                  },
                    React.createElement(BarChart3, {className: "w-5 h-5"}),
                    React.createElement('span', {className: "font-medium"}, "Dashboard")
                  )
                ),

                React.createElement('div', {className: "bg-white rounded-lg p-4 shadow-sm"},
                  React.createElement('h3', {className: "font-semibold mb-2 flex items-center"},
                    React.createElement(TrendingUp, {className: "w-4 h-4 mr-2"}),
                    "Quick Stats"
                  ),
                  React.createElement('div', {className: "text-sm text-gray-600 space-y-1"},
                    React.createElement('p', null, "Entries this week: " + energyEntries.filter(e => {
                      const entryDate = new Date(e.date);
                      const today = new Date(selectedDate);
                      const weekStart = new Date(today);
                      weekStart.setDate(today.getDate() - 6);
                      return entryDate >= weekStart && entryDate <= today;
                    }).length),
                    React.createElement('p', null, "Completion today: " + Math.round((todayEntries.length / 5) * 100) + "%"),
                    !window.matchMedia('(display-mode: standalone)').matches && React.createElement('div', {className: "mt-3 p-2 bg-blue-50 rounded text-xs"},
                      React.createElement('p', {className: "text-blue-700 font-medium"}, "💡 Install as App"),
                      React.createElement('p', {className: "text-blue-600"}, "Tap Safari's share button → \"Add to Home Screen\" for the best experience")
                    )
                  )
                )
              )
            );
          };

          // Route to different views
          if (currentView === 'dashboard') return React.createElement(Dashboard);
          if (currentView.startsWith('log-')) {
            const timeSlotId = currentView.split('-')[1];
            const timeSlot = checkInTimes.find(t => t.id === timeSlotId);
            return React.createElement(LogEntry, {timeSlot: timeSlot});
          }

          return React.createElement(HomeScreen);
        };

        ReactDOM.render(React.createElement(EnergyTrackerApp), document.getElementById('root'));
    </script>
</body>
</html>
